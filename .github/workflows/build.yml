name: Build dxvk-arm64ec WCP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04-arm

    container:
      image: debian:sid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script
        run: apt update && apt install sudo -y && chmod +x build.sh && ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-arm64ec
          path: dxvk-workdir/install/dxvk-*.wcp
